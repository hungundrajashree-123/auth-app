<!DOCTYPE html>
<html>
<head>
  <title>Auth App</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="flex items-center justify-center h-screen bg-gray-100">

  <div class="bg-white p-6 rounded shadow w-80">
    
    <h2 class="text-xl mb-4 text-center">Login</h2>
<form autocomplete="off">
    <input id="username" type="text" placeholder="Username" class="w-full mb-2 p-2 border">
    <input id="password" type="password" placeholder="Password" class="w-full mb-2 p-2 border">

    <button type="button" onclick="login()" class="w-full bg-blue-500 text-white p-2">Login</button>
</form>
    <p class="text-sm mt-3 text-center">
      No account? <span onclick="showRegister()" class="text-blue-500 cursor-pointer">Register</span>
    </p>

    <div id="registerBox" class="hidden mt-4">
      <input id="regEmail" placeholder="Email" class="w-full mb-2 p-2 border">
      <input id="regUsername" placeholder="Username" class="w-full mb-2 p-2 border">
      <input id="regPassword" type="password" placeholder="Password" class="w-full mb-2 p-2 border">

      <button onclick="register()" class="w-full bg-green-500 text-white p-2">Register</button>
    </div>

  </div>

  <script src="js/auth.js"></script>
</body>
</html>
